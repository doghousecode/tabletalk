<style>
  :root{
    --bg:#0e1117;
    --card-teen:#f2c14e;--card-teen-2:#f4a259;
    --card-couple:#e26d7e;--card-couple-2:#c84b6e;
    --card-jobs:#525a66;--card-jobs-2:#23272e;
    --card-mantra:#2bb39a;--card-mantra-2:#0f8a74;
    --card-vocab:#6d6af0;--card-vocab-2:#4338ca;
    --card-joke:#a64bd3;--card-joke-2:#6d1f9c;
    --ink:#16181d;--paper:#fbf7ef;--mute:#7a818c;--line:#222732;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--paper);display:flex;flex-direction:column;height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);user-select:none;touch-action:none;}
  header{flex:0 0 auto;padding:18px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
  .brand{font-weight:800;letter-spacing:-.5px;font-size:20px;display:flex;align-items:center;gap:8px;}
  .brand .name span{opacity:.45;font-weight:600;}
  .brandicon{width:26px;height:26px;border-radius:7px;flex:0 0 auto;}
  .topbtn{background:none;border:1px solid var(--line);color:var(--paper);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;}
  .sync{font-size:10px;color:var(--mute);margin-right:auto;margin-left:12px;font-weight:600;}
  .sync.ok{color:#5fd08a;}.sync.err{color:#e2725b;}
  .modebtn{background:none;border:1px solid var(--line);color:var(--mute);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;margin-right:8px;}
  .modebtn.couple{color:var(--card-couple);border-color:var(--card-couple);}
  .modebtn.jobs{color:#9fb3c8;border-color:#9fb3c8;}
  .modebtn.mantra{color:#5fcfb8;border-color:#5fcfb8;}
  .modebtn.vocab{color:#a5b4fc;border-color:#a5b4fc;}
  .modebtn.jokes{color:#d8a7ff;border-color:#d8a7ff;}
  .chips{flex:0 0 auto;display:flex;gap:8px;overflow-x:auto;padding:6px 20px 10px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;background:#161b24;border:1px solid var(--line);color:var(--mute);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chip.on{background:var(--paper);color:var(--ink);border-color:var(--paper);}
  .stage{flex:1 1 auto;position:relative;margin:6px 18px 0;min-height:0;}
  .card{position:absolute;inset:0;border-radius:26px;padding:34px 30px;display:flex;flex-direction:column;color:var(--ink);box-shadow:0 18px 50px rgba(0,0,0,.45);overflow:hidden;}
  .card.teen{background:linear-gradient(150deg,var(--card-teen),var(--card-teen-2));}
  .card.couple{background:linear-gradient(150deg,var(--card-couple),var(--card-couple-2));color:#fff;}
  .card.jobs{background:linear-gradient(155deg,var(--card-jobs),var(--card-jobs-2));color:#fff;}
  .card.mantra{background:linear-gradient(150deg,var(--card-mantra),var(--card-mantra-2));color:#fff;}
  .card.vocab{background:linear-gradient(150deg,var(--card-vocab),var(--card-vocab-2));color:#fff;}
  .card.jokes{background:linear-gradient(150deg,var(--card-joke),var(--card-joke-2));color:#fff;}
  .card.jokes .q{font-size:clamp(20px,4.6vw,30px);line-height:1.32;font-weight:800;}
  .card.jokes .punch{display:none;margin-top:16px;}
  .card.jokes.revealed .punch{display:block;}
  .card.jokes .tap{margin-top:20px;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.5;}
  .card.jokes.revealed .tap{display:none;}
  .q .word{font-size:clamp(34px,9vw,58px);line-height:1.02;letter-spacing:-1px;}
  .q .pos{font-size:14px;font-weight:600;font-style:italic;opacity:.7;margin-top:6px;}
  .q .def{font-size:clamp(16px,3.8vw,22px);font-weight:600;opacity:.92;line-height:1.32;margin-top:16px;}
  .q .eg{font-size:clamp(14px,3.2vw,18px);font-weight:500;font-style:italic;opacity:.72;line-height:1.34;margin-top:12px;}
  .card .cat{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;opacity:.6;}
  .card .q{flex:1;display:flex;align-items:center;font-size:clamp(26px,6.4vw,40px);font-weight:800;line-height:1.18;letter-spacing:-.5px;}
  .card .foot{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;opacity:.5;}
  .star{position:absolute;top:22px;right:22px;width:46px;height:46px;border-radius:50%;border:none;background:rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;z-index:3;}
  .couple .star{background:rgba(255,255,255,.18);}
  .star.on{background:#16181d;color:var(--card-teen);}
  .couple .star.on{background:#fff;color:var(--card-couple-2);}
  .jobs .star{background:rgba(255,255,255,.14);}
  .jobs .star.on{background:#fff;color:var(--card-jobs-2);}
  .mantra .star{background:rgba(255,255,255,.18);}
  .mantra .star.on{background:#fff;color:var(--card-mantra-2);}
  .vocab .star{background:rgba(255,255,255,.18);}
  .vocab .star.on{background:#fff;color:var(--card-vocab-2);}
  .jokes .star{background:rgba(255,255,255,.18);}
  .jokes .star.on{background:#fff;color:var(--card-joke-2);}
  .badge{position:absolute;font-size:24px;font-weight:900;letter-spacing:1px;padding:6px 14px;border-radius:10px;opacity:0;border:3px solid;pointer-events:none;}
  .badge.save{top:28px;left:50%;transform:translateX(-50%);color:#1f8f4e;border-color:#1f8f4e;}
  .badge.next{top:90px;left:30px;color:#2a6f97;border-color:#2a6f97;transform:rotate(-8deg);}
  .badge.hide{bottom:30px;left:50%;transform:translateX(-50%);color:#e0563b;border-color:#e0563b;}
  .controls{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:18px;padding:16px 20px calc(14px + env(safe-area-inset-bottom));}
  .nav{width:64px;height:64px;border-radius:50%;border:1px solid var(--line);background:#161b24;color:var(--paper);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
  .nav:active{transform:scale(.92);}
  .nav.big{width:74px;height:74px;background:var(--paper);color:var(--ink);font-size:30px;}
  .counter{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:12px;color:var(--mute);font-weight:600;pointer-events:none;}
  .sheet{position:fixed;inset:0;background:var(--bg);z-index:50;transform:translateY(100%);transition:.28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .sheet.open{transform:translateY(0);}
  .sheet h2{padding:20px;font-size:22px;display:flex;justify-content:space-between;align-items:center;}
  .sheet .close{background:none;border:none;color:var(--paper);font-size:26px;cursor:pointer;}
  .slist{flex:1;overflow-y:auto;padding:0 18px 24px;display:flex;flex-direction:column;gap:12px;}
  .sitem{background:#161b24;border:1px solid var(--line);border-radius:16px;padding:18px;font-size:17px;font-weight:600;line-height:1.35;position:relative;}
  .sitem .tag{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.5;display:block;margin-bottom:8px;}
  .sitem .x{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--mute);font-size:20px;cursor:pointer;}
  .empty{color:var(--mute);text-align:center;padding:60px 30px;font-size:16px;line-height:1.5;}

  .reset-btn{width:100%;background:none;border:1px solid var(--line);color:var(--mute);border-radius:14px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
  .reset-btn.confirm{color:#e2725b;border-color:#e2725b;}

</head>
<body>
<header>
  <div class="brand" id="brand"><img class="brandicon" src="apple-touch-icon.png" alt=""><span class="name">Table<span>Talk</span></span></div>
  <span class="sync" id="sync">·</span>
  <button class="modebtn" id="modeBtn" onclick="flipDeck()">Taco Tinks ⇄</button>
  <button class="topbtn" id="starredBtn">⭐ <span id="starCount">0</span></button>
</header>
<div class="chips" id="chips"></div>
<div class="stage" id="stage"><div class="counter" id="counter"></div></div>
<div class="controls">
  <button class="nav" onclick="btnPrev()" aria-label="Previous">‹</button>
  <button class="nav big" id="starBtn" onclick="toggleStar()" aria-label="Star">☆</button>
  <button class="nav" onclick="shuffleDeck()" aria-label="Shuffle">⤮</button>
  <button class="nav" onclick="btnNext()" aria-label="Next">›</button>
</div>
<div class="sheet" id="sheet">
  <h2>Saved cards <button class="close" onclick="closeSheet()">✕</button></h2>
  <div class="slist" id="slist"></div>
  <div class="foot"><button class="reset-btn" id="resetBtn">Reset to cold start</button></div>
</div>
<script>
const syncEl=document.getElementById('sync');
let baseSync={t:'·',c:''},flashTimer=null;
function renderSync(t,c){syncEl.textContent=t;syncEl.className='sync'+(c?' '+c:'');}
function setSync(t,c){baseSync={t:t,c:c||''};clearTimeout(flashTimer);renderSync(t,c);}
function flashSync(t,c){renderSync(t,c);clearTimeout(flashTimer);flashTimer=setTimeout(()=>renderSync(baseSync.t,baseSync.c),4500);}

function parseUA(ua){
  let browser='Other';
  if(/Edg\//.test(ua))browser='Edge';else if(/OPR\//.test(ua))browser='Opera';
  else if(/Chrome\//.test(ua)&&!/Chromium/.test(ua))browser='Chrome';
  else if(/CriOS/.test(ua))browser='Chrome';else if(/FxiOS/.test(ua))browser='Firefox';
  else if(/Firefox\//.test(ua))browser='Firefox';
  else if(/Safari\//.test(ua)&&/Version\//.test(ua))browser='Safari';
  let os='Other';
  if(/iPhone|iPad|iPod/.test(ua))os='iOS';else if(/Android/.test(ua))os='Android';
  else if(/Mac OS X/.test(ua))os='macOS';else if(/Windows/.test(ua))os='Windows';
  else if(/Linux/.test(ua))os='Linux';
  return{browser,os};
}
function trackVisit(){const ua=navigator.userAgent,p=parseUA(ua);
  track('tabletalk_visits',{path:location.pathname||'/',ref:document.referrer||null,
    device:(/Mobi|Android|iPhone|iPad/i.test(ua)?'mobile':'desktop'),
    browser:p.browser,os:p.os,lang:(navigator.language||'').slice(0,10),
    screen:(screen.width&&screen.height)?(screen.width+'x'+screen.height):null});}
function trackEvent(name,meta){track('tabletalk_events',{name:name,meta:meta||null});}

const CATS={teen:[["all","All"],["fun","Fun"],["deep","Deep"],["wyr","Would You Rather"],["family","Family"]],couple:[["all","All"],["playful","Playful"],["deep","Deep"],["memories","Memories"],["future","Future"]],jobs:[["all","All"],["craft","Craft"],["people","People"],["culture","Culture"],["vision","Vision"]],mantra:[["all","All"],["mindset","Mindset"],["discipline","Discipline"],["leadership","Leadership"],["family","Family"]],vocab:[["all","All"],["everyday","Everyday"],["describe","Describe"],["feelings","Feelings"],["teens","Teens"]],jokes:[["all","All"],["dad","Dad Jokes"],["oneliners","One-Liners"],["limericks","Limericks"]]};
const CATLABEL={fun:"Fun",deep:"Deep",wyr:"Would You Rather",family:"Family",playful:"Playful",memories:"Memories",future:"Future",craft:"Craft",people:"People",culture:"Culture",vision:"Vision",mindset:"Mindset",discipline:"Discipline",leadership:"Leadership",everyday:"Everyday",describe:"Describe",feelings:"Feelings",teens:"Teens",dad:"Dad Jokes",oneliners:"One-Liners",limericks:"Limericks"};

const DECKORDER=["teen","vocab","jokes","couple","jobs","mantra"];
const DECKNAME={teen:"Taco Tinks",couple:"Mr & Mrs",jobs:"Steve Jobs",mantra:"Mantras",vocab:"Wordsmith",jokes:"Giggles"};
let deck="teen",cat="all",order=[],idx=0,starred=[],hidden=new Set();
const isStarred=it=>starred.some(s=>s.deck===deck&&s.q===it.q);
function buildOrder(){const g=DECKS[deck];let pool=[];for(const c in g){if(cat==="all"||cat===c)g[c].forEach(q=>{if(!hidden.has(deck+'|'+q))pool.push({cat:c,q});});}for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}order=pool;idx=0;}

const stage=document.getElementById('stage');
let topCard=null,underCard=null;
function vocabHtml(q){const p=q.split('|');return '<div><div class="word">'+p[0]+'</div>'+(p[1]?'<div class="pos">'+p[1]+'</div>':'')+'<div class="def">'+(p[2]||'')+'</div>'+(p[3]?'<div class="eg">'+p[3]+'</div>':'')+'</div>';}
const REVEAL_CATS={dad:1};
function jokeHtml(item){const p=item.q.split('\n');
  if(REVEAL_CATS[item.cat]&&p.length>1)return '<div><div class="setup">'+p[0]+'</div><div class="punch">'+p.slice(1).join('<br>')+'</div><div class="tap">tap to reveal</div></div>';
  return item.q.replace(/\n/g,'<br>');}
function savedHtml(s){if(s.deck==='vocab'){const p=s.q.split('|');return '<b>'+p[0]+'</b> — '+(p[2]||'');}return s.q.replace(/\n/g,'<br>');}
function makeCard(item){const el=document.createElement('div');el.className='card '+deck;
  const hint=deck==='jokes'?'tap reveal · ↑ save · ↓ hide':'↑ save · ← next · → back';
  el.innerHTML='<div class="badge save">SAVE</div><div class="badge next">NEXT</div><div class="badge hide">HIDE</div>'+
   '<button class="star '+(isStarred(item)?'on':'')+'">'+(isStarred(item)?'★':'☆')+'</button>'+
   '<div class="cat">'+(CATLABEL[item.cat]||item.cat)+'</div>'+
   '<div class="q">'+(deck==='vocab'?vocabHtml(item.q):deck==='jokes'?jokeHtml(item):item.q)+'</div>'+
   '<div class="foot"><span>'+DECKNAME[deck]+'</span><span>'+hint+'</span></div>';
  el.querySelector('.star').addEventListener('click',ev=>{ev.stopPropagation();toggleStar();});
  return el;}
function mount(){stage.querySelectorAll('.card').forEach(c=>c.remove());
  const cur=order[idx],nxt=order[(idx+1)%order.length];
  underCard=makeCard(nxt);underCard.style.transform='scale(.96) translateY(10px)';underCard.style.opacity='.85';
  topCard=makeCard(cur);stage.appendChild(underCard);stage.appendChild(topCard);attach(topCard);
  document.getElementById('counter').textContent=(idx+1)+' / '+order.length;syncStarBtn();}
function syncStarBtn(){document.getElementById('starBtn').textContent=isStarred(order[idx])?'★':'☆';document.getElementById('starCount').textContent=starred.length;}

function snapBack(el){el.style.transition='transform .22s cubic-bezier(.2,.8,.3,1)';el.style.transform='';
  el.querySelectorAll('.badge').forEach(b=>b.style.opacity=0);
  if(underCard){underCard.style.transition='.22s';underCard.style.transform='scale(.96) translateY(10px)';underCard.style.opacity='.85';}}
function attach(el){let sx=0,sy=0,dx=0,dy=0,down=false,t0=0,locked=null,prevCard=null,tapEl=null;
  const save=el.querySelector('.badge.save'),next=el.querySelector('.badge.next'),hideB=el.querySelector('.badge.hide');
  const canHide=deck==='jokes';
  function ensurePrev(){if(prevCard)return;const W=stage.clientWidth;prevCard=makeCard(order[(idx-1+order.length)%order.length]);
    prevCard.style.transition='none';prevCard.style.transform='translateX('+(-W)+'px)';prevCard.style.opacity='0';prevCard.style.zIndex='5';stage.appendChild(prevCard);}
  function dropPrev(){if(!prevCard)return;const pc=prevCard,W=stage.clientWidth;prevCard=null;
    pc.style.transition='transform .24s ease, opacity .2s';pc.style.transform='translateX('+(-W)+'px)';pc.style.opacity='0';setTimeout(()=>pc.remove(),240);}
  el.addEventListener('pointerdown',e=>{down=true;sx=e.clientX;sy=e.clientY;t0=Date.now();locked=null;tapEl=e.target;el.setPointerCapture(e.pointerId);el.style.transition='none';});
  el.addEventListener('pointermove',e=>{if(!down)return;dx=e.clientX-sx;dy=e.clientY-sy;
    if(locked===null&&(Math.abs(dx)>6||Math.abs(dy)>6))locked=Math.abs(dx)>Math.abs(dy)?'x':'y';
    if(locked==='x'){
      if(dx>0){const W=stage.clientWidth;el.style.transform='';next.style.opacity=0;save.style.opacity=0;
        if(underCard){underCard.style.transform='scale(.96) translateY(10px)';underCard.style.opacity='.85';}
        ensurePrev();prevCard.style.transition='none';prevCard.style.transform='translateX('+Math.min(0,-W+dx)+'px)';prevCard.style.opacity=Math.min(1,dx/(W*0.4));
      }else{if(prevCard)dropPrev();
        el.style.transform='translateX('+dx+'px) rotate('+(dx*0.05)+'deg)';
        const p=Math.min(1,Math.abs(dx)/120);next.style.opacity=p;save.style.opacity=0;
        if(underCard){const s=.96+.04*p;underCard.style.transform='scale('+s+') translateY('+(10-10*p)+'px)';underCard.style.opacity=.85+.15*p;}}
    }else if(locked==='y'){
      const uy=(dy<0||canHide)?dy:Math.min(0,dy);el.style.transform='translateY('+uy+'px)';
      const p=Math.min(1,Math.abs(uy)/120);save.style.opacity=dy<0?p:0;if(hideB)hideB.style.opacity=(dy>0&&canHide)?p:0;next.style.opacity=0;
      if(underCard){const s=.96+.04*p;underCard.style.transform='scale('+s+') translateY('+(10-10*p)+'px)';underCard.style.opacity=.85+.15*p;}
    }});
  el.addEventListener('pointerup',()=>{if(!down)return;down=false;const dt=Date.now()-t0;
    if(locked==='x'){
      if(dx>0){const vel=dx/dt,go=dx>110||vel>0.6;
        if(go&&prevCard){prevCard.style.transition='transform .26s cubic-bezier(.2,.8,.3,1), opacity .2s';prevCard.style.transform='translateX(0px)';prevCard.style.opacity='1';prevCard=null;
          setTimeout(()=>{idx=(idx-1+order.length)%order.length;mount();},240);}
        else{dropPrev();snapBack(el);}
      }else{const vel=Math.abs(dx)/dt,go=Math.abs(dx)>110||vel>0.6;if(go)flyNext(el,-1);else snapBack(el);}
    }else if(locked==='y'){const vel=Math.abs(dy)/dt,go=Math.abs(dy)>110||vel>0.6;
      if(go&&dy<0){if(!isStarred(order[idx]))toggleStarSilent();flyUp(el);}
      else if(go&&dy>0&&canHide){hideCurrent();flyDown(el);}
      else snapBack(el);}
    else{if(!(tapEl&&tapEl.closest&&tapEl.closest('.star'))&&el.querySelector('.punch'))el.classList.toggle('revealed');snapBack(el);}});}
function advance(){idx=(idx+1)%order.length;if(idx===0)buildOrder();mount();}
function flyNext(el,dir){el.style.transition='transform .26s ease-out, opacity .26s';el.style.transform='translateX('+(dir*window.innerWidth*1.2)+'px) rotate('+(dir*14)+'deg)';el.style.opacity='0';
  if(underCard){underCard.style.transition='.26s';underCard.style.transform='scale(1)';underCard.style.opacity='1';}
  setTimeout(advance,200);}
function flyUp(el){el.style.transition='transform .26s ease-out, opacity .26s';el.style.transform='translateY('+(-window.innerHeight*1.1)+'px) rotate(-4deg)';el.style.opacity='0';
  if(underCard){underCard.style.transition='.26s';underCard.style.transform='scale(1)';underCard.style.opacity='1';}
  setTimeout(advance,200);}
function flyDown(el){el.style.transition='transform .26s ease-out, opacity .26s';el.style.transform='translateY('+(window.innerHeight*1.1)+'px) rotate(4deg)';el.style.opacity='0';
  if(underCard){underCard.style.transition='.26s';underCard.style.transform='scale(1)';underCard.style.opacity='1';}
  setTimeout(advance,200);}
function hideCurrent(){const it=order[idx];const key=deck+'|'+it.q;if(hidden.has(key))return;hidden.add(key);persistHidden();flashSync('hidden','ok');trackEvent('hide',{deck:deck,cat:it.cat});}
function persistHidden(){localStorage.setItem('tt_hidden',JSON.stringify([...hidden]));}
function loadHidden(){try{hidden=new Set(JSON.parse(localStorage.getItem('tt_hidden')||'[]'));}catch(e){hidden=new Set();}}
function goPrev(){const W=stage.clientWidth,pc=makeCard(order[(idx-1+order.length)%order.length]);
  pc.style.transition='none';pc.style.transform='translateX('+(-W)+'px)';pc.style.opacity='0';pc.style.zIndex='5';stage.appendChild(pc);
  requestAnimationFrame(()=>{pc.style.transition='transform .3s cubic-bezier(.2,.8,.3,1), opacity .25s';pc.style.transform='translateX(0px)';pc.style.opacity='1';});
  setTimeout(()=>{idx=(idx-1+order.length)%order.length;mount();},280);}
function btnNext(){if(topCard)flyNext(topCard,-1);}
function btnPrev(){goPrev();}
function shuffleDeck(){buildOrder();mount();trackEvent('shuffle',{deck:deck});}

function setDeck(d){deck=d;cat="all";
  const mb=document.getElementById('modeBtn');
  mb.textContent=DECKNAME[d]+' ⇄';
  mb.className='modebtn'+(d==='couple'?' couple':d==='jobs'?' jobs':d==='mantra'?' mantra':d==='vocab'?' vocab':d==='jokes'?' jokes':'');
  renderChips();buildOrder();mount();trackEvent('deck',{deck:d});}
function flipDeck(){setDeck(DECKORDER[(DECKORDER.indexOf(deck)+1)%DECKORDER.length]);}
function renderChips(){const w=document.getElementById('chips');w.innerHTML='';CATS[deck].forEach(([k,l])=>{const b=document.createElement('button');b.className='chip'+(cat===k?' on':'');b.textContent=l;b.onclick=()=>{cat=k;renderChips();buildOrder();mount();};w.appendChild(b);});}

function toggleStar(){const it=order[idx];const i=starred.findIndex(s=>s.deck===deck&&s.q===it.q);if(i>=0){starred.splice(i,1);flashSync('removed');}else{starred.push({deck,cat:it.cat,q:it.q});flashSync('saved','ok');trackEvent('save',{deck,cat:it.cat});}persistLocal();mount();}
function toggleStarSilent(){const it=order[idx];if(isStarred(it))return;starred.push({deck,cat:it.cat,q:it.q});persistLocal();flashSync('saved','ok');trackEvent('save',{deck,cat:it.cat});}
function persistLocal(){localStorage.setItem('tt_starred',JSON.stringify(starred));}
function loadStars(){try{starred=JSON.parse(localStorage.getItem('tt_starred')||'[]');}catch(e){starred=[];}syncStarBtn();}

const sheet=document.getElementById('sheet');
document.getElementById('starredBtn').onclick=()=>{renderSlist();sheet.classList.add('open');};
function closeSheet(){sheet.classList.remove('open');resetBtn.className='reset-btn';resetBtn.textContent='Reset to cold start';}
const resetBtn=document.getElementById('resetBtn');let resetArmed=false,resetTimer=null;
resetBtn.onclick=()=>{
  if(!resetArmed){resetArmed=true;resetBtn.className='reset-btn confirm';resetBtn.textContent='Tap again to confirm — this clears saved & hidden cards';
    clearTimeout(resetTimer);resetTimer=setTimeout(()=>{resetArmed=false;resetBtn.className='reset-btn';resetBtn.textContent='Reset to cold start';},4000);return;}
  clearTimeout(resetTimer);resetArmed=false;
  starred=[];hidden=new Set();persistLocal();persistHidden();
  resetBtn.className='reset-btn';resetBtn.textContent='Reset to cold start';
  renderSlist();syncStarBtn();buildOrder();mount();closeSheet();flashSync('reset','ok');
};
function renderSlist(){const l=document.getElementById('slist');if(!starred.length){l.innerHTML='<div class="empty">No saved cards yet.<br>Swipe a card up, or tap the star, to keep it here for later.</div>';return;}
  l.innerHTML='';starred.forEach((s,i)=>{const d=document.createElement('div');d.className='sitem';
    d.innerHTML='<span class="tag">'+(DECKNAME[s.deck]||s.deck)+' · '+(CATLABEL[s.cat]||s.cat)+'</span>'+savedHtml(s)+'<button class="x">✕</button>';
    d.querySelector('.x').onclick=()=>{starred.splice(i,1);persistLocal();renderSlist();syncStarBtn();mount();};l.appendChild(d);});}

document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')btnNext();if(e.key==='ArrowRight')btnPrev();if(e.key==='ArrowUp'){e.preventDefault();if(topCard){if(!isStarred(order[idx]))toggleStarSilent();flyUp(topCard);}}if(e.key==='ArrowDown'&&deck==='jokes'){e.preventDefault();if(topCard){hideCurrent();flyDown(topCard);}}if(e.key==='Enter'&&topCard&&topCard.querySelector('.punch')){topCard.classList.toggle('revealed');}if(e.key===' '){e.preventDefault();toggleStar();}});
setDeck('teen');loadStars();loadHidden();trackVisit();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
</html>
