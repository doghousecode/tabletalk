<title>TableTalk</title>

<style>
  :root{
    --bg:#0e1117;
    --card-teen:#f2c14e;--card-teen-2:#f4a259;
    --card-couple:#e26d7e;--card-couple-2:#c84b6e;
    --card-jobs:#525a66;--card-jobs-2:#23272e;
    --card-mantra:#2bb39a;--card-mantra-2:#0f8a74;
    --ink:#16181d;--paper:#fbf7ef;--mute:#7a818c;--line:#222732;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--paper);display:flex;flex-direction:column;height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);user-select:none;touch-action:none;}
  header{flex:0 0 auto;padding:18px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
  .brand{font-weight:800;letter-spacing:-.5px;font-size:20px;display:flex;align-items:center;gap:8px;}
  .brand .name span{opacity:.45;font-weight:600;}
  .brandicon{width:26px;height:26px;border-radius:7px;flex:0 0 auto;}
  .topbtn{background:none;border:1px solid var(--line);color:var(--paper);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;}
  .sync{font-size:10px;color:var(--mute);margin-right:auto;margin-left:12px;font-weight:600;}
  .sync.ok{color:#5fd08a;}.sync.err{color:#e2725b;}
  .modebtn{background:none;border:1px solid var(--line);color:var(--mute);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;margin-right:8px;}
  .modebtn.couple{color:var(--card-couple);border-color:var(--card-couple);}
  .modebtn.jobs{color:#9fb3c8;border-color:#9fb3c8;}
  .modebtn.mantra{color:#5fcfb8;border-color:#5fcfb8;}
  .chips{flex:0 0 auto;display:flex;gap:8px;overflow-x:auto;padding:6px 20px 10px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;background:#161b24;border:1px solid var(--line);color:var(--mute);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chip.on{background:var(--paper);color:var(--ink);border-color:var(--paper);}
  .stage{flex:1 1 auto;position:relative;margin:6px 18px 0;min-height:0;}
  .card{position:absolute;inset:0;border-radius:26px;padding:34px 30px;display:flex;flex-direction:column;color:var(--ink);box-shadow:0 18px 50px rgba(0,0,0,.45);overflow:hidden;}
  .card.teen{background:linear-gradient(150deg,var(--card-teen),var(--card-teen-2));}
  .card.couple{background:linear-gradient(150deg,var(--card-couple),var(--card-couple-2));color:#fff;}
  .card.jobs{background:linear-gradient(155deg,var(--card-jobs),var(--card-jobs-2));color:#fff;}
  .card.mantra{background:linear-gradient(150deg,var(--card-mantra),var(--card-mantra-2));color:#fff;}
  .card .cat{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;opacity:.6;}
  .card .q{flex:1;display:flex;align-items:center;font-size:clamp(26px,6.4vw,40px);font-weight:800;line-height:1.18;letter-spacing:-.5px;}
  .card .foot{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;opacity:.5;}
  .star{position:absolute;top:22px;right:22px;width:46px;height:46px;border-radius:50%;border:none;background:rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;z-index:3;}
  .couple .star{background:rgba(255,255,255,.18);}
  .star.on{background:#16181d;color:var(--card-teen);}
  .couple .star.on{background:#fff;color:var(--card-couple-2);}
  .jobs .star{background:rgba(255,255,255,.14);}
  .jobs .star.on{background:#fff;color:var(--card-jobs-2);}
  .mantra .star{background:rgba(255,255,255,.18);}
  .mantra .star.on{background:#fff;color:var(--card-mantra-2);}
  .badge{position:absolute;font-size:24px;font-weight:900;letter-spacing:1px;padding:6px 14px;border-radius:10px;opacity:0;border:3px solid;pointer-events:none;}
  .badge.save{top:28px;left:50%;transform:translateX(-50%);color:#1f8f4e;border-color:#1f8f4e;}
  .badge.next{top:90px;left:30px;color:#2a6f97;border-color:#2a6f97;transform:rotate(-8deg);}
  .controls{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:18px;padding:16px 20px calc(14px + env(safe-area-inset-bottom));}
  .nav{width:64px;height:64px;border-radius:50%;border:1px solid var(--line);background:#161b24;color:var(--paper);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
  .nav:active{transform:scale(.92);}
  .nav.big{width:74px;height:74px;background:var(--paper);color:var(--ink);font-size:30px;}
  .counter{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:12px;color:var(--mute);font-weight:600;pointer-events:none;}
  .sheet{position:fixed;inset:0;background:var(--bg);z-index:50;transform:translateY(100%);transition:.28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .sheet.open{transform:translateY(0);}
  .sheet h2{padding:20px;font-size:22px;display:flex;justify-content:space-between;align-items:center;}
  .sheet .close{background:none;border:none;color:var(--paper);font-size:26px;cursor:pointer;}
  .slist{flex:1;overflow-y:auto;padding:0 18px 24px;display:flex;flex-direction:column;gap:12px;}
  .sitem{background:#161b24;border:1px solid var(--line);border-radius:16px;padding:18px;font-size:17px;font-weight:600;line-height:1.35;position:relative;}
  .sitem .tag{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.5;display:block;margin-bottom:8px;}
  .sitem .x{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--mute);font-size:20px;cursor:pointer;}
  .empty{color:var(--mute);text-align:center;padding:60px 30px;font-size:16px;line-height:1.5;}
</style>
</head>

</div>
<div class="sheet" id="sheet">

  <div class="slist" id="slist"></div>
</div>

 mantra:{
  mindset:["These are the good old days, so try to notice them while you are still in them.","You get to do this, not you have to. Swap one for the other and watch the day change.","Your mind tends to believe whatever you repeat to it, so be careful what you rehearse.","Worry is just imagination spent on the future you do not want.","The story you tell yourself about your day quietly becomes the day you live.","You can be exhausted and grateful at the same time; both are allowed to be true.","Most of what you have worried about never actually happened. Let that be your evidence.","Comparison is the thief of joy. The only fair comparison is to who you were yesterday.","Slow is smooth, and smooth is fast.","Feelings are visitors. Let them arrive, say what they came to say, and move on.","You are always one small decision away from a completely different kind of day.","What you give your attention to is what grows, so spend it like it matters, because it does.","Hard is not the same as bad. Most things worth having ask something of you first.","Be where your feet are; the moment in front of you is the only one you can actually live.","The obstacle in the way often turns out to be the way through.","You will never have this exact ordinary day again, which is part of what makes it precious.","Aim for progress, not perfection. Perfection is mostly procrastination in a nicer outfit.","Assume the best about people. You will be right more often than wrong, and lighter for it.","Gratitude is what turns whatever you already have into enough.","Do not believe everything you think; the mind is a storyteller, not a reporter.","This too shall pass, the hard parts and the good, so hold both a little more gently.","Everything has a cost, so choose your hard on purpose instead of by accident.","Calm is a quiet advantage; the steadiest person in the room usually ends up leading it.","Someday is not a day of the week. If it matters, find the smallest first step and take it today.","Make peace with the past so it stops charging rent in your present.","Fall in love with the process and the results tend to take care of themselves.","You can do hard things. You already have, even on the days you doubted it.","Energy follows attention, so point both at what you want more of.","Some days the only win is that you kept going, and that counts more than it feels like it does.","Calm down, zoom out, and ask whether this will matter in a year."],
  discipline:["You get out what you put in, and usually a little more, given enough time.","Discipline is just choosing what you want most over what you want right now.","Do the thing you are avoiding first; the whole day gets lighter once it is behind you.","Motivation gets you started, but habit is what carries you when motivation does not show up.","How you do anything is how you do everything, so practise care even on the small stuff.","Amateurs wait for inspiration; everyone else just gets quietly to work.","Small things done daily will quietly outrun big things done once in a while.","The standard you walk past is the standard you have agreed to accept.","Done is better than perfect, because done can be improved and perfect never ships.","You do not rise to the level of your goals; you fall to the level of your systems.","A little discomfort now is the price of admission to a life that actually means something.","Win the first hour of the morning and you have usually won the day.","Consistency compounds. Boring, repeated effort is the most underrated force there is.","If something genuinely matters, do a little of it every day rather than all of it, rarely.","Focus is not saying yes to the great thing; it is saying no to a thousand merely good ones.","Show up especially on the days you do not feel like it; those are the ones that count double.","Make the good habit easy to start and the bad one slightly annoying to reach.","Your future is built quietly in the boring middle, long after the excitement wears off.","Effort is a skill, not a mood. You can genuinely get better at trying.","When you are stretched too thin, cut the scope, not the standard.","One percent better is almost invisible day to day, and over a year it changes everything.","Action cures fear faster than thinking ever will.","Protect your mornings and your attention; they are the real assets, not your time in general.","Do less, but do it better. Depth beats a long list of half-finished things.","The first draft only has to exist. You can make it good once it is on the page.","Sweat the few details people actually feel, and let the rest of them go.","You can collect results or collect excuses, but it is hard to do much of both.","Earn your rest, then take it fully and without guilt.","Start before you feel ready; readiness usually shows up after you begin, not before.","The work itself is part of the reward, not just the thing standing between you and it."],
  leadership:["Hire people smarter than you, show them what good looks like, then get out of their way.","Praise in public and correct in private; protecting dignity costs nothing and buys everything.","Be hard on the problem and easy on the person. They are not the same fight.","Clear is kind. Vague feedback feels gentle but it only postpones the hard conversation.","The best leaders are measured by the leaders they create, not the followers they collect.","Listen to understand rather than to reply, and people will tell you what actually matters.","Trust is built in small drops over time and lost in buckets in a moment, so guard it.","Whatever behaviour you tolerate becomes the real standard, whatever the values poster says.","Feedback is a gift. Give it often, give it kindly, and give it close to the moment.","Take more than your share of the blame and less than your share of the credit.","People do not care how much you know until they know how much you care about them.","Culture is simply what people do when you are not in the room.","You can disagree completely in the meeting, then commit completely once it is decided.","Slow down to go fast; an hour of alignment can save a week of rework.","Your calm sets the temperature of the whole room, especially when things go wrong.","Ask more questions than you answer; the best answer in the room is rarely only yours.","Catch people doing things right and say so out loud; it is rarer than criticism and worth more.","The team copies what you actually do, not what you say in the all-hands.","Give people the context behind the task and they will make better calls than any instruction could.","Be the kind of boss and teammate you wish you had earlier in your own career.","Hard conversations only get heavier the longer you carry them, so have them sooner.","Whatever you reward is what you will get more of, so reward it carefully.","Make it genuinely safe to tell you the truth, or you will be the last person to hear it.","Own the whole outcome, not just your slice; that is what separates a leader from a contributor.","People forget the deadline but remember exactly how you treated them under pressure.","Lead from beside your team at least as often as from in front of it.","Default to generosity with your time, your patience, and your credit.","The standard is excellence and the tone is kindness; you do not have to trade one for the other.","Protect your people from the noise so they can do the work only they can do.","Say thank you specifically. Generic praise lands soft; precise praise lands deep."],
  family:["They will not remember the gift nearly as long as they remember the time you spent.","Be the calm in their storm; your steadiness is how they learn to handle their own.","The days are long but the years are short, so try not to wish too much of it away.","Connection before correction. A child who feels close listens far better than one who feels small.","Presence is the best present, and it is the one thing no one else can give them.","Put the phone down. They are only this age once, and they notice where your eyes go.","Say sorry first when you get it wrong; you are the grown-up, and they learn repair from you.","Listen to the small stuff now so they trust you with the big stuff later.","Make home the safest place in the world to fail, and they will dare more out in it.","Your kids are quietly learning how to love by watching how you treat their other parent.","Love, to a child, is mostly spelled T-I-M-E.","Be quick to listen and slow to react; most heated moments cool with three seconds of silence.","The relationship is almost always more important than being right about the small thing.","Make memories on purpose, not just plans; the unscheduled moments are the ones they keep.","Repair beats perfect. Coming back warmly after a hard moment matters more than never losing it.","Show up for the ordinary Tuesday, not just the big occasions; that is where childhood actually lives.","Your attention is the truest measure of your love, far more than anything you can buy.","Let them catch you keeping your word, especially when it would be easier not to.","Hug a little longer than feels normal; no one has ever regretted the extra few seconds.","Discipline works best wrapped in warmth, not fear; the aim is guidance, not obedience.","Notice out loud the things you appreciate about them before you notice what needs fixing.","Be interested in them, not just interesting to them.","The little moments you are tempted to skip are usually the big ones in disguise.","Choose them on purpose every day, the way you did at the very start.","Laugh together often; shared laughter is the quiet glue that holds a family together.","You are not only raising children for today; you are building the adults they will become.","Slow mornings and unhurried bedtimes are worth protecting from the rush.","When you are wrong with them, admit it plainly; it teaches honesty better than any lecture.","Catch them being good and name it, so they learn who they are from your eyes.","Home is a feeling you build, not a place you buy."]
 }
};
const CATS={teen:[["all","All"],["fun","Fun"],["deep","Deep"],["wyr","Would You Rather"],["family","Family"]],couple:[["all","All"],["playful","Playful"],["deep","Deep"],["memories","Memories"],["future","Future"]],jobs:[["all","All"],["craft","Craft"],["people","People"],["culture","Culture"],["vision","Vision"]],mantra:[["all","All"],["mindset","Mindset"],["discipline","Discipline"],["leadership","Leadership"],["family","Family"]]};
const CATLABEL={fun:"Fun",deep:"Deep",wyr:"Would You Rather",family:"Family",playful:"Playful",memories:"Memories",future:"Future",craft:"Craft",people:"People",culture:"Culture",vision:"Vision",mindset:"Mindset",discipline:"Discipline",leadership:"Leadership"};

const DECKORDER=["teen","couple","jobs","mantra"];
const DECKNAME={teen:"Taco Tinks",couple:"Mr & Mrs",jobs:"Steve Jobs",mantra:"Mantras"};
let deck="teen",cat="all",order=[],idx=0,starred=[];
const isStarred=it=>starred.some(s=>s.deck===deck&&s.q===it.q);
function buildOrder(){const g=DECKS[deck];let pool=[];for(const c in g){if(cat==="all"||cat===c)g[c].forEach(q=>pool.push({cat:c,q}));}for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}order=pool;idx=0;}

const stage=document.getElementById('stage');
let topCard=null,underCard=null;
function makeCard(item){const el=document.createElement('div');el.className='card '+deck;
  el.innerHTML='<div class="badge save">SAVE</div><div class="badge next">NEXT</div>'+
   '<button class="star '+(isStarred(item)?'on':'')+'">'+(isStarred(item)?'★':'☆')+'</button>'+
   '<div class="cat">'+(CATLABEL[item.cat]||item.cat)+'</div>'+
   '<div class="q">'+item.q+'</div>'+
   '<div class="foot"><span>'+DECKNAME[deck]+'</span><span>↑ save · ← next · → back</span></div>';
  el.querySelector('.star').addEventListener('click',ev=>{ev.stopPropagation();toggleStar();});
  return el;}
function mount(){stage.querySelectorAll('.card').forEach(c=>c.remove());
  const cur=order[idx],nxt=order[(idx+1)%order.length];
  underCard=makeCard(nxt);underCard.style.transform='scale(.96) translateY(10px)';underCard.style.opacity='.85';
  topCard=makeCard(cur);stage.appendChild(underCard);stage.appendChild(topCard);attach(topCard);
  document.getElementById('counter').textContent=(idx+1)+' / '+order.length;syncStarBtn();}
function syncStarBtn(){document.getElementById('starBtn').textContent=isStarred(order[idx])?'★':'☆';document.getElementById('starCount').textContent=starred.length;}

function snapBack(el){el.style.transition='transform .22s cubic-bezier(.2,.8,.3,1)';el.style.transform='';
  el.querySelectorAll('.badge').forEach(b=>b.style.opacity=0);
  if(underCard){underCard.style.transition='.22s';underCard.style.transform='scale(.96) translateY(10px)';underCard.style.opacity='.85';}}
function attach(el){let sx=0,sy=0,dx=0,dy=0,down=false,t0=0,locked=null,prevCard=null;
  const save=el.querySelector('.badge.save'),next=el.querySelector('.badge.next');
  function ensurePrev(){if(prevCard)return;const W=stage.clientWidth;prevCard=makeCard(order[(idx-1+order.length)%order.length]);
    prevCard.style.transition='none';prevCard.style.transform='translateX('+(-W)+'px)';prevCard.style.opacity='0';prevCard.style.zIndex='5';stage.appendChild(prevCard);}
  function dropPrev(){if(!prevCard)return;const pc=prevCard,W=stage.clientWidth;prevCard=null;
    pc.style.transition='transform .24s ease, opacity .2s';pc.style.transform='translateX('+(-W)+'px)';pc.style.opacity='0';setTimeout(()=>pc.remove(),240);}
  el.addEventListener('pointerdown',e=>{down=true;sx=e.clientX;sy=e.clientY;t0=Date.now();locked=null;el.setPointerCapture(e.pointerId);el.style.transition='none';});
  el.addEventListener('pointermove',e=>{if(!down)return;dx=e.clientX-sx;dy=e.clientY-sy;
    if(locked===null&&(Math.abs(dx)>6||Math.abs(dy)>6))locked=Math.abs(dx)>Math.abs(dy)?'x':'y';
    if(locked==='x'){
      if(dx>0){const W=stage.clientWidth;el.style.transform='';next.style.opacity=0;save.style.opacity=0;
        if(underCard){underCard.style.transform='scale(.96) translateY(10px)';underCard.style.opacity='.85';}
        ensurePrev();prevCard.style.transition='none';prevCard.style.transform='translateX('+Math.min(0,-W+dx)+'px)';prevCard.style.opacity=Math.min(1,dx/(W*0.4));
      }else{if(prevCard)dropPrev();
        el.style.transform='translateX('+dx+'px) rotate('+(dx*0.05)+'deg)';
        const p=Math.min(1,Math.abs(dx)/120);next.style.opacity=p;save.style.opacity=0;
        if(underCard){const s=.96+.04*p;underCard.style.transform='scale('+s+') translateY('+(10-10*p)+'px)';underCard.style.opacity=.85+.15*p;}}
    }else if(locked==='y'){
      const uy=Math.min(0,dy);el.style.transform='translateY('+uy+'px)';
      const p=Math.min(1,-uy/120);save.style.opacity=p;next.style.opacity=0;
      if(underCard){const s=.96+.04*p;underCard.style.transform='scale('+s+') translateY('+(10-10*p)+'px)';underCard.style.opacity=.85+.15*p;}
    }});
  el.addEventListener('pointerup',()=>{if(!down)return;down=false;const dt=Date.now()-t0;
    if(locked==='x'){
      if(dx>0){const vel=dx/dt,go=dx>110||vel>0.6;
        if(go&&prevCard){prevCard.style.transition='transform .26s cubic-bezier(.2,.8,.3,1), opacity .2s';prevCard.style.transform='translateX(0px)';prevCard.style.opacity='1';prevCard=null;
          setTimeout(()=>{idx=(idx-1+order.length)%order.length;mount();},240);}
        else{dropPrev();snapBack(el);}
      }else{const vel=Math.abs(dx)/dt,go=Math.abs(dx)>110||vel>0.6;if(go)flyNext(el,-1);else snapBack(el);}
    }else if(locked==='y'){const vel=-dy/dt,go=(-dy)>110||vel>0.6;
      if(go&&dy<0){if(!isStarred(order[idx]))toggleStarSilent();flyUp(el);}else snapBack(el);}
    else snapBack(el);});}
function advance(){idx=(idx+1)%order.length;if(idx===0)buildOrder();mount();}
function flyNext(el,dir){el.style.transition='transform .26s ease-out, opacity .26s';el.style.transform='translateX('+(dir*window.innerWidth*1.2)+'px) rotate('+(dir*14)+'deg)';el.style.opacity='0';
  if(underCard){underCard.style.transition='.26s';underCard.style.transform='scale(1)';underCard.style.opacity='1';}
  setTimeout(advance,200);}
function flyUp(el){el.style.transition='transform .26s ease-out, opacity .26s';el.style.transform='translateY('+(-window.innerHeight*1.1)+'px) rotate(-4deg)';el.style.opacity='0';
  if(underCard){underCard.style.transition='.26s';underCard.style.transform='scale(1)';underCard.style.opacity='1';}
  setTimeout(advance,200);}
function goPrev(){const W=stage.clientWidth,pc=makeCard(order[(idx-1+order.length)%order.length]);
  pc.style.transition='none';pc.style.transform='translateX('+(-W)+'px)';pc.style.opacity='0';pc.style.zIndex='5';stage.appendChild(pc);
  requestAnimationFrame(()=>{pc.style.transition='transform .3s cubic-bezier(.2,.8,.3,1), opacity .25s';pc.style.transform='translateX(0px)';pc.style.opacity='1';});
  setTimeout(()=>{idx=(idx-1+order.length)%order.length;mount();},280);}
function btnNext(){if(topCard)flyNext(topCard,-1);}
function btnPrev(){goPrev();}
function shuffleDeck(){buildOrder();mount();}

function setDeck(d){deck=d;cat="all";
  const mb=document.getElementById('modeBtn');
  mb.textContent=DECKNAME[d]+' ⇄';
  mb.className='modebtn'+(d==='couple'?' couple':d==='jobs'?' jobs':d==='mantra'?' mantra':'');
  renderChips();buildOrder();mount();}
function flipDeck(){setDeck(DECKORDER[(DECKORDER.indexOf(deck)+1)%DECKORDER.length]);}
function renderChips(){const w=document.getElementById('chips');w.innerHTML='';CATS[deck].forEach(([k,l])=>{const b=document.createElement('button');b.className='chip'+(cat===k?' on':'');b.textContent=l;b.onclick=()=>{cat=k;renderChips();buildOrder();mount();};w.appendChild(b);});}

function toggleStar(){const it=order[idx];const i=starred.findIndex(s=>s.deck===deck&&s.q===it.q);if(i>=0){const r=starred.splice(i,1)[0];removeRemote(r);}else{const r={deck,cat:it.cat,q:it.q};starred.push(r);saveRemote(r);}persistLocal();mount();}
function toggleStarSilent(){const it=order[idx];if(isStarred(it))return;const r={deck,cat:it.cat,q:it.q};starred.push(r);saveRemote(r);persistLocal();}
function persistLocal(){localStorage.setItem('tt_starred',JSON.stringify(starred));}
async function saveRemote(r){if(!remote)return;try{await sb.from('tabletalk_stars').upsert({profile:PROFILE,deck:r.deck,cat:r.cat,q:r.q},{onConflict:'profile,deck,q'});setSync('saved','ok');}catch(e){setSync('offline','err');}}
async function removeRemote(r){if(!remote)return;try{await sb.from('tabletalk_stars').delete().match({profile:PROFILE,deck:r.deck,q:r.q});}catch(e){}}
async function loadStars(){const local=JSON.parse(localStorage.getItem('tt_starred')||'[]');starred=local;
  if(remote){try{const {data,error}=await sb.from('tabletalk_stars').select('deck,cat,q').eq('profile',PROFILE);
    if(!error&&data){const seen=new Set();starred=[];data.forEach(r=>{const k=r.deck+'|'+r.q;if(!seen.has(k)){seen.add(k);starred.push(r);}});persistLocal();setSync('synced','ok');}}catch(e){setSync('offline','err');}}else setSync('local only');
  syncStarBtn();}

const sheet=document.getElementById('sheet');
document.getElementById('starredBtn').onclick=()=>{renderSlist();sheet.classList.add('open');};
function closeSheet(){sheet.classList.remove('open');}
function renderSlist(){const l=document.getElementById('slist');if(!starred.length){l.innerHTML='<div class="empty">No saved questions yet.<br>Swipe a card left, or tap the star, to keep it here for later.</div>';return;}
  l.innerHTML='';starred.forEach((s,i)=>{const d=document.createElement('div');d.className='sitem';
    d.innerHTML='<span class="tag">'+(DECKNAME[s.deck]||s.deck)+' · '+(CATLABEL[s.cat]||s.cat)+'</span>'+s.q+'<button class="x">✕</button>';
    d.querySelector('.x').onclick=()=>{const r=starred.splice(i,1)[0];removeRemote(r);persistLocal();renderSlist();syncStarBtn();mount();};l.appendChild(d);});}

document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')btnNext();if(e.key==='ArrowRight')btnPrev();if(e.key==='ArrowUp'){e.preventDefault();if(topCard){if(!isStarred(order[idx]))toggleStarSilent();flyUp(topCard);}}if(e.key===' '){e.preventDefault();toggleStar();}});
setDeck('teen');loadStars();
</script>
</body>
</html>
